name: Deploy infrastructure

on:
  pull_request:
    paths:
      - infra/**
  push:
    branches:
      - main
    paths:
      - infra/**

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  ARM_USE_AZUREAD: "true"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_BACKEND_RESOURCE_GROUP_NAME: ${{ vars.TF_BACKEND_RESOURCE_GROUP_NAME }}
  TF_BACKEND_STORAGE_ACCOUNT_NAME: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT_NAME }}
  TF_BACKEND_CONTAINER_NAME: ${{ vars.TF_BACKEND_CONTAINER_NAME }}
  TF_BACKEND_KEY: ${{ vars.TF_BACKEND_KEY }}

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: infra
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Azure and backend configuration
        run: |
          missing=()
          required_vars=(
            ARM_CLIENT_ID
            ARM_SUBSCRIPTION_ID
            ARM_TENANT_ID
            TF_BACKEND_RESOURCE_GROUP_NAME
            TF_BACKEND_STORAGE_ACCOUNT_NAME
            TF_BACKEND_CONTAINER_NAME
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing+=("${var_name}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub environment secrets or variables: ${missing[*]}"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER_NAME}" \
            -backend-config="key=${TF_BACKEND_KEY:-dev/terraform.tfstate}" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Terraform plan
        id: plan
        continue-on-error: true
        run: |
          set +e
          terraform plan \
            -no-color \
            -input=false \
            -lock-timeout=300s \
            -detailed-exitcode \
            -out=tfplan \
            > plan-output.txt 2>&1
          exit_code=$?

          if [ -f tfplan ]; then
            terraform show -no-color tfplan > plan.txt
          else
            cp plan-output.txt plan.txt
          fi

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          if [ "${exit_code}" -eq 0 ]; then
            echo "status=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${exit_code}" -eq 2 ]; then
            echo "status=changes_detected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=failed" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"

      - name: Post Terraform plan to pull request
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_STATUS: ${{ steps.plan.outputs.status || 'failed' }}
          PLAN_PATH: infra/plan.txt
          PLAN_SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- terraform-plan-comment -->';
            const status = process.env.PLAN_STATUS;
            const planPath = process.env.PLAN_PATH;
            const sha = process.env.PLAN_SHA;
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : 'terraform plan did not produce output.';

            const statusText = {
              no_changes: 'No changes detected',
              changes_detected: 'Changes detected',
              failed: 'Plan failed',
            }[status] || 'Plan failed';

            const maxPlanLength = 60000;
            const renderedPlan = plan.length > maxPlanLength
              ? `${plan.slice(0, maxPlanLength)}\n... plan output truncated ...`
              : plan;

            const body = [
              marker,
              '## Terraform plan',
              `**Commit:** \`${sha}\``,
              `**Status:** ${statusText}`,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```hcl',
              renderedPlan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail when Terraform plan fails
        if: steps.plan.outputs.status == 'failed'
        run: exit 1

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: infra
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Azure and backend configuration
        run: |
          missing=()
          required_vars=(
            ARM_CLIENT_ID
            ARM_SUBSCRIPTION_ID
            ARM_TENANT_ID
            TF_BACKEND_RESOURCE_GROUP_NAME
            TF_BACKEND_STORAGE_ACCOUNT_NAME
            TF_BACKEND_CONTAINER_NAME
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              missing+=("${var_name}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub environment secrets or variables: ${missing[*]}"
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TF_BACKEND_CONTAINER_NAME}" \
            -backend-config="key=${TF_BACKEND_KEY:-dev/terraform.tfstate}" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Terraform plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -lock-timeout=300s \
            -out=tfplan

      - name: Terraform apply
        run: |
          terraform apply \
            -no-color \
            -input=false \
            -lock-timeout=300s \
            -auto-approve \
            tfplan
