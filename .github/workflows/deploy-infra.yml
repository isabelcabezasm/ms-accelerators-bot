name: Deploy Infrastructure

on:
  pull_request:
    paths:
      - infra/**
      - .github/workflows/deploy-infra.yml
  push:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/deploy-infra.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-infra-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform modules
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        run: terraform validate

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Write backend configuration
        run: |
          cat > backend.github.hcl <<EOF
          resource_group_name  = "${{ secrets.TF_BACKEND_RESOURCE_GROUP }}"
          storage_account_name = "${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}"
          container_name       = "${{ secrets.TF_BACKEND_CONTAINER }}"
          key                  = "${{ secrets.TF_BACKEND_KEY }}"
          use_azuread_auth     = true
          use_oidc             = true
          EOF

      - name: Initialize remote backend
        run: terraform init -backend-config=backend.github.hcl

      - name: Create Terraform plan
        run: terraform plan -out=tfplan

      - name: Apply Terraform plan
        run: terraform apply -auto-approve tfplan
